services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baucua-fe-app
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      VITE_APP_ENV: ${VITE_APP_ENV:-local}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - '5173:5173'
    command: >
      sh -c "if [ -f package.json ]; then
      npm run dev -- --host 0.0.0.0 --port 5173;
      else
      echo 'No package.json found. Baseline container idle.' && sleep infinity;
      fi"
